services:
  test-pg:
    image: postgis/postgis:16-master
    container_name: aef-test-pg
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d postgres"]
      interval: 3s
      timeout: 3s
      retries: 20
