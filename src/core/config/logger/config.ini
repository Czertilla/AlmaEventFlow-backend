[logconfig]
disable_existing_loggers = True

[loggers]
keys = root

[formatters]
keys = standard, colorized, json, tg

[formatter_standard]
format = %(asctime)s [%(process)s] %(levelname)-8s | %(name)s:%(funcName)s:%(lineno)s - %(message)s

[formatter_colorized]
class = core.config.logger.formatter.ColorizedFormatter

[formatter_json]
class = core.config.logger.formatter.JSONFormatter

[formatter_tg]
class = core.config.logger.formatter.TGFormatter

[handlers]
keys = console, file_debug, file_json, tg_crit

[handler_console]
class = logging.StreamHandler
level = INFO
formatter = colorized
stream = ext://sys.stdout

[handler_file_debug]
class = logging.handlers.TimedRotatingFileHandler
level = DEBUG
formatter = standard
args = ('logs/app.log',)
kwargs = {'when': "midnight", 'backupCount': 365, 'encoding': 'utf-8'}


[handler_file_json]
class = logging.handlers.RotatingFileHandler
level = WARNING
formatter = json
args = ('logs/app.jsonl',)
kwargs = {'maxBytes': 50000, 'backupCount': 3, 'encoding': 'utf-8'}


[handler_tg_crit]
class = core.config.logger.handler.TelegramLogHandler
level = CRITICAL
formatter = tg

[logger_root]
level = NOTSET
handlers = console, file_debug, file_json, tg_crit
